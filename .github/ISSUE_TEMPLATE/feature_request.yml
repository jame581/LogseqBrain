name: Feature request
description: Suggest an improvement to a brain skill, the graph schema, or plugin workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Clear use cases and constraints help keep the project focused.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What gap or friction are you trying to solve?
      placeholder: Describe the problem from a user perspective.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, trade-offs, or why existing behavior is not enough.
  - type: dropdown
    id: impact
    attributes:
      label: Primary impact area
      options:
        - brain-init (graph setup)
        - brain-load (context retrieval)
        - brain-save (persistence)
        - brain-status (dashboard)
        - Graph schema / page format
        - Cross-platform support (Copilot / Gemini / other)
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Examples, screenshots, references, or prior discussions.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues before opening this request.
          required: true
        - label: This request is specific enough to discuss or implement.
          required: true
